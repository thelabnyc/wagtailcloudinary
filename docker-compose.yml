version: "3"

services:
  db:
    image: postgres:18@sha256:98f32d2e093deea07127bcc373f89729b77ff3486511cc77224c530e63a41f0e
    environment:
      POSTGRES_HOST_AUTH_METHOD: "trust"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    links:
      - db:db
